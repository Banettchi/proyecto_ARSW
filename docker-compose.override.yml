services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=auth_db
      - DB_PORT=5432
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=auth_user
      - POSTGRES_PASSWORD=${AUTH_DB_PASSWORD:-changeme_in_production}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASSWORD=admin_secret
    depends_on:
      auth_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - shark-network

  profile-service:
    build:
      context: ./profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=profile_db
      - DB_PORT=5432
      - POSTGRES_DB=profile_db
      - POSTGRES_USER=profile_user
      - POSTGRES_PASSWORD=${PROFILE_DB_PASSWORD:-changeme_in_production}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=admin
      - RABBITMQ_PASSWORD=admin_secret
      - INTERNAL_SECRET=${INTERNAL_SECRET:-super_secret_internal_key_123}
    depends_on:
      profile_db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - shark-network

networks:
  shark-network:
    name: shark-network
